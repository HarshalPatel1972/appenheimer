name: CI (Fast)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend:
    name: Backend Unit & Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'backend/go.mod'
          cache: true
      - name: Unit Tests & Coverage Gate
        run: |
          cd backend
          go test -short -coverprofile=coverage.out ./...
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 85.0" | bc -l) )); then
            echo "Coverage is below 85%!"
            exit 1
          fi
      - name: Integration Tests (Testcontainers)
        run: cd backend && go test -v ./tests/integration/...
        
  frontend:
    name: Frontend Lint & Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci
      - name: OpenAPI Contract Verify
        run: echo "Verifying API Contract vs OpenAPI.yaml..." # Placeholder for openapi-typescript or similar

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - run: ./tests/smoke/smoke.sh
